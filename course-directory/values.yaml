# Default values for ltic-access-request.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: nginx
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  host: chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

db:
  name: course-directory
  username: course-directory
  password: course-directory
  host: somehost

app:
  flask:
    env: staging
    secretKey: YrMPnLidOFprMuNmxpIc3dT1sd0LErZy
  port: 5000
  smtp:
    host: mail.example.com
    port: 1025
    user: ''
    password: ''
    from: noreply@example.com
    useTls: 'true'
  allowedEmailDomains: 'ubc.ca,mail.ubc.ca'
  serviceNowEmail: 'helpdesk@example.com'

# SAML 2.0 SSO (UBC CWL).
# When `saml.enabled` is true, the chart creates an ExternalSecret that pulls
# the SP keypair and IdP metadata from Vault into a Kubernetes Secret, mounts
# the files into the pod, and sets the SAML_* env vars the Flask app expects.
# Defaults are tuned for staging; override per environment.
saml:
  enabled: false
  serviceProvider:
    # Public-facing base URL (used to construct ACS + entity ID).
    # Defaults to `https://{{ .Values.ingress.host }}` when left empty.
    baseUrl: ""
    entityId: ""  # defaults to "{baseUrl}/auth/saml/metadata" when empty
    # Where the secret materials are mounted inside the pod.
    certMountPath: /etc/saml
    keyFilename: sp.key
    certFilename: sp.crt
    metadataFilename: idp-metadata.xml
    # Keys produced inside the synced Kubernetes Secret. The deployment uses
    # `items:` to map these onto the filenames above.
    keySecretKey: sp-key
    certSecretKey: sp-cert
    metadataSecretKey: idp-metadata
    # Vault path + property names that ExternalSecret pulls from.
    externalSecretPath: "course-directory/saml"
    externalSecretKeyProperty: "sp.key"
    externalSecretCertProperty: "sp.crt"
    externalSecretMetadataProperty: "idp-metadata.xml"
  contact:
    name: "Course Directory Admin"
    email: "jason.hall@ubc.ca"

# ExternalSecret (external-secrets.io/v1) configuration shared by all
# chart-managed ExternalSecret resources. Activated whenever any feature
# (currently: saml) needs Vault-backed secrets.
externalSecret:
  secretStoreRefName: ""
  secretStoreRefKind: ClusterSecretStore  # or SecretStore
  refreshInterval: 1h

# Database migration Job — Helm pre-install/pre-upgrade hook that runs
# `flask db upgrade` once per release revision before any pod is created.
# Required for safe multi-replica deployments (otherwise N pods race the
# upgrade on simultaneous start). Disable only for emergency manual
# rollback scenarios.
migrations:
  enabled: true
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  resources: {}
    # requests:
    #   cpu: 50m
    #   memory: 128Mi
