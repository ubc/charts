apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ltic-access-request.fullname" . }}
  labels:
    {{- include "ltic-access-request.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ltic-access-request.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ltic-access-request.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.volumeMounts .Values.saml.enabled }}
          volumeMounts:
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.saml.enabled }}
            - name: saml-certs
              mountPath: {{ .Values.saml.serviceProvider.certMountPath }}
              readOnly: true
            {{- end }}
          {{- end }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.db.username }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.db.password }}
            - name: POSTGRES_DB
              value: {{ .Values.db.name }}
            - name: POSTGRES_HOST
              value: {{ .Values.db.host }}
            - name: DATABASE_URL
              value: {{ printf "postgresql+psycopg://%s:%s@%s:5432/%s" .Values.db.username .Values.db.password .Values.db.host .Values.db.name | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.db.password }}
            - name: FLASK_ENV
              value: {{ .Values.app.flask.env }}
            - name: SECRET_KEY
              value: {{ .Values.app.flask.secretKey }}
            - name: SMTP_HOST
              value: {{ .Values.app.smtp.host }}
            - name: SMTP_PORT
              value: {{ .Values.app.smtp.port | quote}}
            - name: SMTP_USE_TLS
              value: {{ .Values.app.smtp.useTls | quote }}
            - name: SMTP_USER
              value: {{ .Values.app.smtp.user }}
            - name: SMTP_PASSWORD
              value: {{ .Values.app.smtp.password }}
            - name: SMTP_FROM
              value: {{ .Values.app.smtp.from }}
            - name: ALLOWED_EMAIL_DOMAINS
              value: {{ .Values.app.smtp.allowedEmailDomains }}
            - name: BASE_URL
              value: https://{{ .Values.ingress.host }}
            {{- if .Values.saml.enabled }}
            {{- $samlBaseUrl := .Values.saml.serviceProvider.baseUrl | default (printf "https://%s" .Values.ingress.host) }}
            {{- $samlEntityId := .Values.saml.serviceProvider.entityId | default (printf "%s/auth/saml/metadata" $samlBaseUrl) }}
            - name: SAML_ENABLED
              value: "true"
            - name: SAML_SP_BASE_URL
              value: {{ $samlBaseUrl | quote }}
            - name: SAML_SP_ENTITY_ID
              value: {{ $samlEntityId | quote }}
            - name: SAML_SP_CERT_PATH
              value: {{ printf "%s/%s" .Values.saml.serviceProvider.certMountPath .Values.saml.serviceProvider.certFilename | quote }}
            - name: SAML_SP_KEY_PATH
              value: {{ printf "%s/%s" .Values.saml.serviceProvider.certMountPath .Values.saml.serviceProvider.keyFilename | quote }}
            - name: SAML_IDP_METADATA_PATH
              value: {{ printf "%s/%s" .Values.saml.serviceProvider.certMountPath .Values.saml.serviceProvider.metadataFilename | quote }}
            - name: SAML_CONTACT_NAME
              value: {{ .Values.saml.contact.name | quote }}
            - name: SAML_CONTACT_EMAIL
              value: {{ .Values.saml.contact.email | quote }}
            {{- end }}
      {{- if or .Values.volumes .Values.saml.enabled }}
      volumes:
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.saml.enabled }}
        - name: saml-certs
          secret:
            secretName: {{ include "ltic-access-request.fullname" . }}-saml
            items:
              - key: {{ .Values.saml.serviceProvider.keySecretKey }}
                path: {{ .Values.saml.serviceProvider.keyFilename }}
              - key: {{ .Values.saml.serviceProvider.certSecretKey }}
                path: {{ .Values.saml.serviceProvider.certFilename }}
              - key: {{ .Values.saml.serviceProvider.metadataSecretKey }}
                path: {{ .Values.saml.serviceProvider.metadataFilename }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
