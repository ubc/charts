{{- /*
Credentials are read back from the existing Secret via `lookup` so upgrades
keep the values generated at install time. `lookup` returns nothing under
`helm template` and GitOps engines (ArgoCD), where silent regeneration would
rotate the credentials and roll every pod on each render — set
generatePasswords: false there and supply .Values.secret / db.auth.password
explicitly (or use externalSecrets), and the render fails loudly instead.
*/}}
{{- if not .Values.externalSecrets.enabled }}
{{- $secretObj := lookup "v1" "Secret" .Release.Namespace (include "webwork.fullname" .) }}
{{- $existingData := dict }}
{{- if $secretObj }}
{{- $existingData = $secretObj.data }}
{{- end }}
{{- $webworkSecret := .Values.secret }}
{{- if not $webworkSecret }}
{{- if hasKey $existingData "webwork_secret" }}
{{- $webworkSecret = index $existingData "webwork_secret" | b64dec }}
{{- else if .Values.generatePasswords }}
{{- $webworkSecret = randAlphaNum 32 }}
{{- else }}
{{- fail "generatePasswords is false and no existing webwork_secret was found (lookup is unavailable under helm template/ArgoCD): set .Values.secret explicitly or enable externalSecrets" }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "webwork.fullname" . }}
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
type: Opaque
data:
  webwork_secret: {{ $webworkSecret | b64enc | quote }}
  {{- if eq (include "webwork.db.provider" .) "external" }}
  {{- $dbPassword := .Values.db.auth.password }}
  {{- if not $dbPassword }}
  {{- if hasKey $existingData "db_password" }}
  {{- $dbPassword = index $existingData "db_password" | b64dec }}
  {{- else if .Values.generatePasswords }}
  {{- $dbPassword = randAlphaNum 16 }}
  {{- else }}
  {{- fail "generatePasswords is false and no existing db_password was found: set db.auth.password explicitly or enable externalSecrets" }}
  {{- end }}
  {{- end }}
  db_password: {{ $dbPassword | b64enc | quote }}
  {{- end }}
{{- end }}

{{- if .Values.shibd.sp.key }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "webwork.fullname" . }}-shibd
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
type: Opaque
data:
  sp-cert.pem: {{ .Values.shibd.sp.cert | b64enc | quote }}
  sp-key.pem: {{ .Values.shibd.sp.key | b64enc | quote }}
{{- end }}

{{- if and (eq (include "webwork.db.provider" .) "ack") (not .Values.externalSecrets.enabled) }}
{{- $ackSecretName := printf "%s-ack-db-password" (include "webwork.fullname" .) }}
{{- $ackSecretObj := lookup "v1" "Secret" .Release.Namespace $ackSecretName }}
{{- $ackDbPassword := .Values.db.auth.password }}
{{- if not $ackDbPassword }}
{{- if and $ackSecretObj (hasKey $ackSecretObj.data "password") }}
{{- $ackDbPassword = index $ackSecretObj.data "password" | b64dec }}
{{- else if .Values.generatePasswords }}
{{- $ackDbPassword = randAlphaNum 16 }}
{{- else }}
{{- fail "generatePasswords is false and no existing ack-db-password was found: set db.auth.password explicitly or enable externalSecrets" }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "webwork.fullname" . }}-ack-db-password
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ $ackDbPassword | b64enc | quote }}
{{- end }}
