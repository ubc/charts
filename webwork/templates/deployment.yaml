{{- if .Values.shibd.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "webwork.fullname" . }}-shibd
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
    tier: auth
spec:
  replicas: {{ .Values.shibd.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "webwork.name" . }}-shibd
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "webwork.name" . }}-shibd
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.shibd.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ include "webwork.fullname" . }}-shibd
        image: "{{ .Values.shibd.image.repository }}:{{ .Values.shibd.image.tag | default "latest" }}"
        imagePullPolicy: {{ .Values.shibd.image.pullPolicy }}
        ports:
        - name: shibd
          containerPort: 1600
        env:
        - name: SHIBBOLETH_IDP_DISCOVERY_URL
          value: {{ .Values.shibd.idp.discovery_url | quote }}
        - name: SHIBBOLETH_IDP_ENTITY_ID
          value: {{ .Values.shibd.idp.entity_id | quote }}
        - name: SHIBBOLETH_IDP_METADATA_URL
          value: {{ .Values.shibd.idp.metadata_url | quote }}
        - name: SHIBBOLETH_SP_ENTITY_ID
          value: {{ .Values.shibd.sp.entity_id | quote }}
        - name: SHIBD_ATTRIBUTE_MAP_URL
          value: {{ .Values.shibd.idp.attribute_map_url | quote }}
        - name: SHIBD_LISTENER_ACL
          value: {{ .Values.shibd.listener_acl | quote }}
        - name: SHIBD_LISTENER_ADDRESS
          value: {{ .Values.shibd.listener_address | quote }}
        - name: SHIBD_ODBC_DRIVER
          value: {{ .Values.shibd.odbc.driver | quote }}
        - name: SHIBD_ODBC_LIB
          value: {{ .Values.shibd.odbc.lib | quote }}
        - name: SHIBD_ODBC_DATABASE
          value: {{ .Values.db.auth.database | quote }}
        - name: SHIBD_ODBC_PORT
          {{- if eq (include "webwork.db.provider" .) "ack" }}
          valueFrom:
            configMapKeyRef:
              name: {{ printf "%s-rds-endpoint" (include "webwork.fullname" .) }}
              key: port
          {{- else }}
          value: {{ .Values.db.service.port | quote }}
          {{- end }}
        - name: SHIBD_ODBC_SERVER
          {{- if eq (include "webwork.db.provider" .) "ack" }}
          valueFrom:
            configMapKeyRef:
              name: {{ printf "%s-rds-endpoint" (include "webwork.fullname" .) }}
              key: endpoint
          {{- else }}
          value: {{ template "app.db.fullname" . }}
          {{- end }}
        - name: SHIB_ODBC_PASSWORD
          valueFrom:
            secretKeyRef:
              {{- include "webwork.db.passwordSecretRef" . | nindent 14 }}
        - name: SHIB_ODBC_USER
          value: {{ .Values.db.auth.username | quote }}
        - name: LOG_LEVEL
          value: {{ default "INFO" .Values.shibd.log_level | quote }}
        livenessProbe:
          tcpSocket:
            port: 1600
        readinessProbe:
          tcpSocket:
            port: 1600
        resources:
          {{- toYaml .Values.shibd.resources | nindent 10 }}
        volumeMounts:
        {{- if .Values.shibd.sp.key }}
        - name: shibd-cert
          mountPath: /etc/shibboleth/cert
        {{- end }}
        {{- if .Values.shibd.idp.attribute_map }}
        - name: attribute-map
          mountPath: /etc/shibboleth/attribute-map.xml
          subPath: "attribute-map.xml"
        {{- end }}
      volumes:
      {{- if .Values.shibd.sp.key }}
      - name: shibd-cert
        secret:
          secretName: {{ include "webwork.fullname" . }}-shibd
      {{- end }}
      {{- if .Values.shibd.idp.attribute_map }}
      - name: attribute-map
        configMap:
          name: {{ include "webwork.fullname" . }}-cm
      {{- end }}
{{- end }}


{{- if .Values.r.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "webwork.fullname" . }}-r
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
    tier: r
spec:
  replicas: {{ .Values.r.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "webwork.name" . }}-r
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "webwork.name" . }}-r
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.r.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ include "webwork.fullname" . }}-r
        image: "{{ .Values.r.image.repository }}:{{ .Values.r.image.tag | default "latest" }}"
        imagePullPolicy: {{ .Values.r.image.pullPolicy }}
        ports:
        - name: rserve
          containerPort: 6311
        livenessProbe:
          tcpSocket:
            port: 6311
        readinessProbe:
          tcpSocket:
            port: 6311
        resources:
          {{- toYaml .Values.r.resources | nindent 10 }}
{{- end }}
