{{- if eq (include "webwork.db.provider" .) "ack" }}
{{- $_ := required "db.ack.vpcId is required when db.provider is ack" .Values.db.ack.vpcId }}
{{- if not .Values.db.ack.subnetIDs }}
{{- fail "db.ack.subnetIDs must contain at least one entry when db.provider is ack" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "webwork.fullname" . }}-rds-endpoint
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
# NOTE: do NOT template `data.endpoint`/`data.port` here. The ACK FieldExport
# resources below populate those keys from the live DBInstance status. If Helm
# also manages them, the two field managers fight on every `helm upgrade`:
# a plain upgrade fails with an apply conflict, and `--force-conflicts` blanks
# the DB endpoint (pods then start with an empty WEBWORK_DB_HOST and hang on
# "Waiting for database"). Leaving the keys to the FieldExport makes pods with
# a required configMapKeyRef wait (CreateContainerConfigError) until the real
# values land, which is the desired first-boot behavior.
{{- if not .Values.db.ack.existingSecurityGroupID }}
---
apiVersion: ec2.services.k8s.aws/v1alpha1
kind: SecurityGroup
metadata:
  name: {{ include "webwork.fullname" . }}-rds-sg
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
spec:
  name: {{ include "webwork.fullname" . }}-rds-sg
  description: Security group for {{ include "webwork.fullname" . }} RDS MariaDB instance
  vpcID: {{ .Values.db.ack.vpcId | quote }}
  ingressRules:
  {{- range .Values.db.ack.ingressCIDRs }}
  - ipProtocol: tcp
    fromPort: 3306
    toPort: 3306
    ipRanges:
    - cidrIP: {{ . | quote }}
  {{- end }}
{{- end }}
---
apiVersion: rds.services.k8s.aws/v1alpha1
kind: DBSubnetGroup
metadata:
  name: {{ include "webwork.fullname" . }}-db-subnet-group
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
spec:
  name: {{ include "webwork.fullname" . }}-db-subnet-group
  description: DB subnet group for {{ include "webwork.fullname" . }}
  subnetIDs:
  {{- range .Values.db.ack.subnetIDs }}
  - {{ . | quote }}
  {{- end }}
---
# RDS MariaDB enables binary logging (for backups/replication) but the master
# user lacks SUPER, so creating stored functions/triggers fails unless
# log_bin_trust_function_creators=1. WeBWorK's Minion job-queue migration
# (Mojo::mysql) creates a function and otherwise dies partway, leaving the
# minion_* schema incomplete and the mojo worker crash-looping on
# "Table 'minion_workers' doesn't exist". The default RDS parameter group is
# not editable, so attach a custom one.
apiVersion: rds.services.k8s.aws/v1alpha1
kind: DBParameterGroup
metadata:
  name: {{ include "webwork.fullname" . }}-pg-{{ .Values.db.ack.engineVersion | replace "." "" }}
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
spec:
  name: {{ include "webwork.fullname" . }}-pg-{{ .Values.db.ack.engineVersion | replace "." "" }}
  family: {{ .Values.db.ack.parameterGroupFamily | default (printf "mariadb%s" .Values.db.ack.engineVersion) | quote }}
  description: "WeBWorK {{ include "webwork.fullname" . }} MariaDB parameters"
  parameterOverrides:
    log_bin_trust_function_creators: "1"
    # Match the app/container timezone so MariaDB TIMESTAMP columns (e.g.
    # lti_access_tokens.expires_at) are read in the same zone WeBWorK's Perl
    # localtime uses. RDS defaults to UTC; mismatch makes WeBWorK treat LTI
    # access tokens as valid ~UTC-offset hours too long → reuses expired
    # tokens → Canvas 401 "Access token expired" on grade push. RDS only
    # accepts a fixed named-zone list; US/Pacific == America/Vancouver.
    time_zone: {{ .Values.db.ack.timeZone | default "US/Pacific" | quote }}
---
apiVersion: rds.services.k8s.aws/v1alpha1
kind: DBInstance
metadata:
  name: {{ include "webwork.fullname" . }}
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
spec:
  dbInstanceIdentifier: {{ include "webwork.fullname" . }}
  dbInstanceClass: {{ .Values.db.ack.dbInstanceClass | quote }}
  dbParameterGroupName: {{ include "webwork.fullname" . }}-pg-{{ .Values.db.ack.engineVersion | replace "." "" }}
  engine: mariadb
  engineVersion: {{ .Values.db.ack.engineVersion | quote }}
  masterUsername: {{ .Values.db.auth.username | quote }}
  masterUserPassword:
    name: {{ if .Values.externalSecrets.enabled }}{{ .Values.externalSecrets.secretName }}{{ else }}{{ include "webwork.fullname" . }}-ack-db-password{{ end }}
    key: {{ if .Values.externalSecrets.enabled }}db_password{{ else }}password{{ end }}
  dbName: {{ .Values.db.auth.database | quote }}
  allocatedStorage: {{ .Values.db.ack.allocatedStorage }}
  dbSubnetGroupName: {{ include "webwork.fullname" . }}-db-subnet-group
{{- if .Values.db.ack.existingSecurityGroupID }}
  vpcSecurityGroupIDs:
  - {{ .Values.db.ack.existingSecurityGroupID | quote }}
{{- else }}
  vpcSecurityGroupRefs:
  - from:
      name: {{ include "webwork.fullname" . }}-rds-sg
{{- end }}
  multiAZ: {{ .Values.db.ack.multiAZ }}
  storageType: {{ .Values.db.ack.storageType | quote }}
  storageEncrypted: {{ .Values.db.ack.storageEncrypted }}
  # Data protection (FSBP RDS.8 / RDS.11 / RDS.17). deletionProtection guards the
  # prod DB against accidental teardown; backupRetentionPeriod sets the automated
  # PITR window (days); copyTagsToSnapshot carries tags onto automated snapshots.
  deletionProtection: {{ .Values.db.ack.deletionProtection | default false }}
  backupRetentionPeriod: {{ .Values.db.ack.backupRetentionPeriod | default 7 }}
  copyTagsToSnapshot: {{ .Values.db.ack.copyTagsToSnapshot | default true }}
{{- if .Values.db.ack.performanceInsightsEnabled }}
  performanceInsightsEnabled: true
  performanceInsightsRetentionPeriod: {{ .Values.db.ack.performanceInsightsRetentionPeriod | default 7 }}
{{- end }}
---
apiVersion: services.k8s.aws/v1alpha1
kind: FieldExport
metadata:
  name: {{ include "webwork.fullname" . }}-rds-endpoint-address
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
spec:
  from:
    resource:
      group: rds.services.k8s.aws
      kind: DBInstance
      name: {{ include "webwork.fullname" . }}
    path: .status.endpoint.address
  to:
    kind: configmap
    name: {{ include "webwork.fullname" . }}-rds-endpoint
    namespace: {{ .Release.Namespace }}
    key: endpoint
---
apiVersion: services.k8s.aws/v1alpha1
kind: FieldExport
metadata:
  name: {{ include "webwork.fullname" . }}-rds-endpoint-port
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
spec:
  from:
    resource:
      group: rds.services.k8s.aws
      kind: DBInstance
      name: {{ include "webwork.fullname" . }}
    path: .status.endpoint.port
  to:
    kind: configmap
    name: {{ include "webwork.fullname" . }}-rds-endpoint
    namespace: {{ .Release.Namespace }}
    key: port
{{- end }}
