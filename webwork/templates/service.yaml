apiVersion: v1
kind: Service
metadata:
  name: {{ include "webwork.fullname" . }}
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "webwork.selectorLabels" . | nindent 4 }}

{{- if .Values.shibd.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webwork.fullname" . }}-shibd
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.shibd.service.port }}
    targetPort: 1600
    protocol: TCP
    name: shibd
  selector:
    app.kubernetes.io/name: {{ include "webwork.name" . }}-shibd
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

{{- if .Values.r.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webwork.fullname" . }}-r
  labels:
    {{- include "webwork.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.r.service.port }}
    targetPort: 6311
    protocol: TCP
    name: rserve
  selector:
    app.kubernetes.io/name: {{ include "webwork.name" . }}-r
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
