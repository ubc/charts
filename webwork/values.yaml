# Default values for webwork.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: lthub/webwork
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
rootUrl: http://localhost
timezone: America/Vancouver
systemTimezone: America/Vancouver
# Unprivileged user the long-running WeBWorK processes (web hypnotoad, minion +
# lti1p3 workers, LTI cronjobs) drop to via `sudo -E -u`. The container runs as
# root so the entrypoint can fix file ownership; the app then drops to this user.
# Keep aligned with the EFS access-point gid (www-data = uid/gid 33).
appUser: www-data
# mojolicious secret passphrase - leave empty to auto-generate a stable random value
secret: ""

# Allow the chart to generate random values for `secret` / db.auth.password on
# first install (read back via `lookup` on later upgrades). `lookup` returns
# nothing under `helm template` and GitOps engines (ArgoCD), so generation
# there would silently rotate credentials and roll every pod on each render —
# set this to false in those pipelines and the render fails loudly unless the
# values are supplied explicitly (or externalSecrets is enabled).
generatePasswords: true

# External Secrets Operator integration. When enabled, the chart does NOT
# generate the webwork_secret / ack-db-password Secrets; instead it sources
# webwork_secret + db_password (and, via envFrom, the embedded config secrets
# such as WW_CALIPER_API_KEY and WW_LTI_*_{PUBLIC,PRIVATE}_KEY consumed by
# $ENV{...} in webworkFiles) from an ExternalSecret-managed Secret.
externalSecrets:
  enabled: false
  secretName: ""
  # Optional: name of an ExternalSecret-managed Secret holding a rendered
  # `authen_saml2.yml` key (static SAML config + SP cert/signing_key from Vault).
  # When set, conf/authen_saml2.yml is mounted from it instead of the ConfigMap,
  # keeping the SP keypair out of values.
  saml2SecretName: ""
supportEmail: support@example.edu
# file upload size limit in bytes
maxRequestSize: 1342177280 # 1.25 GiB
smtp:
  server: localhost
  sender: no-reply@example.com

## Enable persistence using Persistent Volume Claims
## ref: http://kubernetes.io/docs/user-guide/persistent-volumes/
##
## storageClass guidance (EKS/EFS): the WeBWorK web + workers all run as
## www-data (uid 33). For the WRITABLE mounts the app must own/edit — course,
## htdocsTmp, htdocsData, logs — use an access point that enforces uid=33 so
## files are born www-data-owned (no chown/group-write dependency, no orphan
## *_tmp dirs). On this platform that is StorageClass `efs-sc-uid33`. Keep the
## read-only OPL `library` on `efs-sc` (uid=0): it is consumed via the
## world-read bit and refreshed by root tooling (OPL-update). (Dynamic
## provisioning; for a data migration onto pre-created APs, bind static PVs
## instead and match storageClass to the PV.)
coursePersistence:
  enabled: false
  ## If defined, volume.beta.kubernetes.io/storage-class: <storageClass>
  ## Default: volume.alpha.kubernetes.io/storage-class: default
  ##
  annotations: {}
  #   nfs.io/storage-path: "testpath"
  storageClass: ""
  accessMode: ReadWriteMany
  size: 8Gi

libraryPersistence:
  enabled: false
  ## If defined, volume.beta.kubernetes.io/storage-class: <storageClass>
  ## Default: volume.alpha.kubernetes.io/storage-class: default
  ##
  annotations: {}
  storageClass: ""
  accessMode: ReadWriteMany
  size: 8Gi

htdocsTmpPersistence:
  enabled: false
  ## If defined, volume.beta.kubernetes.io/storage-class: <storageClass>
  ## Default: volume.alpha.kubernetes.io/storage-class: default
  ##
  annotations: {}
  storageClass: ""
  accessMode: ReadWriteMany
  size: 8Gi

htdocsDataPersistence:
  enabled: false
  ## If defined, volume.beta.kubernetes.io/storage-class: <storageClass>
  ## Default: volume.alpha.kubernetes.io/storage-class: default
  ##
  annotations: {}
  storageClass: ""
  accessMode: ReadWriteMany
  size: 8Gi

logsPersistence:
  enabled: false
  ## If defined, volume.beta.kubernetes.io/storage-class: <storageClass>
  ## Default: volume.alpha.kubernetes.io/storage-class: default
  ##
  annotations: {}
  storageClass: ""
  accessMode: ReadWriteMany
  size: 8Gi

# Ship /opt/webwork/webwork2/logs off-cluster instead of (or in addition to)
# keeping them on a shared volume. A Fluent Bit *native* sidecar (initContainer +
# restartPolicy: Always, so cronjob Jobs still complete) tails the log files and
# HTTP-POSTs them to an on-prem fluentd relay, which fans out to Elasticsearch +
# an archive server.
#
# Typically paired with `logsPersistence.enabled: false` so the logs live on a
# per-pod emptyDir (no shared EFS RWX, no multi-writer interleaving) — but it also
# works with the PVC still enabled (useful as a no-data-loss intermediate step
# during cutover). When enabled and logsPersistence is false, set the rotation
# guard so the unbounded files (timing.log, webwork2.log) can't fill node disk.
logShipping:
  enabled: false
  image:
    repository: cr.fluentbit.io/fluent/fluent-bit
    tag: "3.2.10"
    pullPolicy: IfNotPresent
  # Where the on-prem relay ingress lives. The path segment becomes the fluentd
  # tag (must start with "webwork." to match the relay's <match webwork.**>).
  endpoint:
    host: logs-ingest.ctlt.ubc.ca
    port: 443
    tls: true
    uri: /webwork.prod
  # Labels stamped onto every shipped record (used as ES fields / for filtering).
  labels:
    cluster: appcloud-prod
    service: webwork
  # basicAuth for the relay ingress. With externalSecret.enabled the username/
  # password are synced from Vault (secret/logging/webwork-log-relay) by ESO into
  # `secretName`; otherwise reference an existing Secret with username/password keys.
  auth:
    externalSecret:
      enabled: true
      secretStoreRef: vault-backend
      # key is relative to the vault-backend store (path=secret) -> secret/webwork/prod/logging-relay
      vaultKey: webwork/prod/logging-relay
    secretName: webwork-log-relay-auth
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 192Mi }
  # Copytruncate guard for the unbounded logs when on emptyDir. A tiny busybox
  # native sidecar truncates any *.log over maxBytes every intervalSeconds.
  # Truncate-in-place is safe with WeBWorK's O_APPEND writers and Fluent Bit tail.
  rotation:
    enabled: true
    maxBytes: 209715200        # 200Mi per file
    intervalSeconds: 600
    image:
      repository: busybox
      tag: "1.37"
      pullPolicy: IfNotPresent
  # sizeLimit for the logs emptyDir (only applied when logsPersistence is off).
  emptyDirSizeLimit: 4Gi

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # Image pull secrets to attach to the service account
  imagePullSecrets: []
  # - name: my-registry-secret

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  annotations: {}
    # AWS NLB example:
    # service.beta.kubernetes.io/aws-load-balancer-type: external
    # service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    # service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
  # uncomment to enable hostPort on deployment
  # hostPort: 80
  # uncomment to specify a nodePort
  # nodePort: 30000

ingress:
  enabled: false
  # className is required for Kubernetes >= 1.18 with IngressClass resources
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: chart-example.local
      paths: ["/"]
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Startup probe for the web deployment. The default 40 x 15s = 600s is enough
# for a normal boot, but a FIRST deploy on empty storage clones the ~2.3GB OPL
# library and needs much longer — raise failureThreshold (e.g. 160) for that.
startupProbe:
  failureThreshold: 40
  periodSeconds: 15

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  # NOTE: requires metrics-server on the cluster and resources.requests on the
  # web container (utilization is a percentage of the request). webwork is
  # memory-heavy at idle (~2Gi) — scale on CPU, not memory.
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
  # scaleDown stabilization (seconds) — webwork load is bursty around deadlines
  scaleDownStabilizationSeconds: 300

# Rollout strategy for the WEB Deployment only (workers/shibd/r keep the k8s
# default). Empty = k8s default (RollingUpdate 25%/25%). For zero-downtime
# rollouts set maxSurge: 1 / maxUnavailable: 0.
strategy: {}
#  type: RollingUpdate
#  rollingUpdate:
#    maxSurge: 1
#    maxUnavailable: 0

# PodDisruptionBudget for the WEB deployment only (workers/R excluded): keeps
# at least minAvailable pod through node consolidation / AMI drift evictions.
pdb:
  enabled: false
  minAvailable: 1

nodeSelector: {}

tolerations: []

affinity: {}

# Spread the web replicas across nodes (hard) and, softly, across zones so a
# single node or spot reclamation can't take out every replica at once. Only
# meaningful when running >= 2 web replicas (replicaCount or autoscaling).
# The hard hostname constraint forces Karpenter to keep a second node for the
# web tier (a small baseline-cost trade for HA on the user-facing frontend).
spreadReplicas:
  enabled: false
  zoneSpread: true


##
## MariaDB chart configuration
# ref: https://github.com/ubc/charts/tree/master/mariadb
##
db:
  ## provider selects the database backend:
  ##   ""         auto: resolves to "local" if db.enabled=true, else "external"
  ##   "local"    bundled UBC mariadb subchart (also set db.enabled: true)
  ##   "ack"      AWS ACK RDS controller provisions a managed MariaDB instance
  ##   "external" externally-managed database; supply db.service.name and db.auth.password
  provider: ""
  ## Set to true to deploy the bundled mariadb chart. Required when provider is "local".
  enabled: false
  ## standalone or replication
  architecture: standalone

  db:
    type: mariadb
    driver: MariaDB

  auth:
    username: webwork
    database: webwork
    #prefix:

    ## Leave empty to generate a stable random password at install time
    ## (mariadb subchart for "local", secret.yaml for "ack"; for "external"
    ## you almost always want to set the real password explicitly).
    ## See also generatePasswords for helm template/ArgoCD pipelines.
    password: ""
    replicationPassword: ""

  persistence:
    size: 8Gi
    # storageClassName:

  myCnf: |-
    [mariadb]
    bind-address=0.0.0.0
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2
    max_allowed_packet=256M
    character-set-server=UTF8
    collation-server=utf8_general_ci

  service:
    # uncomment name to use external service
    #name:
    #endpoints:
    #  - 10.0.0.1
    #  - 10.0.0.2
    port: 3306

  ack:
    # AWS region where the RDS instance will be created
    region: us-west-2
    # RDS instance class
    dbInstanceClass: db.t3.medium
    # MariaDB engine version
    engineVersion: "10.6"
    # Allocated storage in GiB
    allocatedStorage: 20
    storageType: gp3
    storageEncrypted: true
    # Enable Multi-AZ deployment
    multiAZ: false
    # Data protection (FSBP RDS.8 / RDS.11 / RDS.17). Conservative defaults:
    # deletion protection off so non-prod can be torn down, 7-day automated
    # backups, and tags copied to snapshots. Override deletionProtection: true
    # and raise backupRetentionPeriod per environment for production data.
    deletionProtection: false
    backupRetentionPeriod: 7
    copyTagsToSnapshot: true
    # RDS Performance Insights (DBLoad / top-SQL telemetry). 7-day retention is
    # the free tier. Off by default; enable per-env in the env values.
    performanceInsightsEnabled: false
    performanceInsightsRetentionPeriod: 7
    # VPC ID for the SecurityGroup (required when provider is "ack")
    vpcId: ""
    # Subnet IDs for the DBSubnetGroup (required when provider is "ack"; at least two)
    subnetIDs: []
    # CIDR blocks allowed to reach RDS on port 3306
    ingressCIDRs:
      - 10.0.0.0/8

shibd:
  enabled: false
  image:
    repository: lthub/shibd
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: latest
  imagePullSecrets: []
  replicas: 1
  idp:
    discovery_url: https://example.com
    metadata_url: https://example.com/idp/shibboleth
    entity_id: https://example.com
    attribute_map_url: https://example.com/attribute-map.xml
#   attributeMap: |
#     <Attributes xmlns="urn:mace:shibboleth:2.0:attribute-map" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
#     </Attributes>
  sp:
    entity_id: https://sp.example.com
    # key:
    # cert:
  # DB coordinates/credentials come from db.auth + the provider wiring
  # (rds-endpoint ConfigMap / passwordSecretRef) — only driver/lib are set here.
  odbc:
    driver:        MySQL
    lib:           odbc-store.so
  service:
    port:             1600
  listener_acl:       0.0.0.0/0
  listener_address:   0.0.0.0
  log_level: INFO
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
  # TODO: Add vars to deployment

# webworkFiles:
#   localOverride: |
#   authen_saml2: |

r:
  enabled: true
  #externalHost: r.example.com
  image:
    repository: ubcctlt/rserve
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: latest
  imagePullSecrets: []
  replicas: 1
  service:
    port: 6311

worker:
  lti1p3:
    enabled: true
    replicaCount: 1
    nodeSelector: {}
    tolerations: []
    affinity: {}
    resources: {}
  mojo:
    enabled: true
    replicaCount: 1
    nodeSelector: {}
    tolerations: []
    affinity: {}
    resources: {}

cronjob:
  # Job-level controls shared by both LTI cronjobs. Finished Jobs (and their
  # pods) are deleted after ttlSecondsAfterFinished — 24h leaves a debugging
  # window between the daily runs while keeping failed Jobs from pinning
  # KubeJobFailed alerts forever.
  ttlSecondsAfterFinished: 86400
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  backoffLimit: 2
  # Requests-only default: lets the scheduler place the pod properly without
  # risking an OOM-kill mid grade-sync. Add limits per site if needed.
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
  lti_update_classlist:
    enabled: true
    schedule: "0 11 * * *"
    #startingDeadlineSeconds:
    restartPolicy: Never
  lti_update_grades:
    enabled: true
    schedule: "0 13 * * *"
    #startingDeadlineSeconds:
    restartPolicy: Never

# Google Calendar sync cronjob (formerly a standalone webworkcal manifest).
# Publishes assignment due dates from the webwork DB to a Google calendar.
# DB access reuses the chart's db.* wiring. The Google service-account key is
# mounted from a Secret with key `service-account.json`: either synced from
# Vault via ESO (externalSecret) or a pre-created Secret (existingSecret).
# Job-level controls (ttl/history/backoff) come from the shared cronjob block.
webworkcal:
  enabled: false
  schedule: "0 9 * * *"
  image:
    repository: lthub/webworkcal
    tag: latest
    pullPolicy: IfNotPresent
  # Target Google calendar ID (required when enabled)
  calendar: ""
  # Pre-created Secret containing service-account.json
  # (ignored when externalSecret.enabled)
  existingSecret: ""
  externalSecret:
    enabled: false
    secretStoreRef: vault-backend
    # relative to the store's base path (secret/); expects property
    # service_account_json
    vaultKey: webwork/prod/webworkcal
  resources:
    requests:
      cpu: 50m
      memory: 128Mi

# Roll the web/worker/shibd Deployments when their ESO-synced Secrets change
# (Vault rotation otherwise leaves running pods on stale env credentials —
# kube never refreshes env secretKeyRefs in a running pod). Deploys the
# Stakater Reloader subchart scoped to the release namespace and annotates
# the Deployments with the ESO-managed secret names.
reloader:
  enabled: false
  # values passed through to the stakater/reloader subchart
  reloader:
    watchGlobally: false

# Extra environment variables appended to all webwork containers (web +
# workers). e.g. MOJO_TRUSTED_PROXIES so hypnotoad resolves the real client
# IP through a multi-hop proxy chain (upstream ALB -> internal ALB).
extraEnv: []
# - name: MOJO_TRUSTED_PROXIES
#   value: "10.0.0.0/16"
