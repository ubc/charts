nodeSelector: {}

tolerations: []

affinity: {}


##
## MariaDB chart configuration
# ref: https://github.com/ubc/charts/tree/master/mariadb
##
db:
  ## provider selects the database backend:
  ##   ""         auto: resolves to "local" if db.enabled=true, else "external"
  ##   "local"    bundled UBC mariadb subchart (also set db.enabled: true)
  ##   "ack"      AWS ACK RDS controller provisions a managed MariaDB instance
  ##   "external" externally-managed database; supply db.service.name and db.auth.password
  provider: ""
  ## Set to true to deploy the bundled mariadb chart. Required when provider is "local".
  enabled: false
  ## standalone or replication
  architecture: standalone

  db:
    type: mariadb
    driver: MariaDB

  auth:
    username: &dbUser webwork
    database: &dbName webwork
    #prefix:

    ## If the password is not specified, mariadb will generate a random password
    ##
    password: &dbPass randompassword
    replicationPassword: 'replicationpassword'

  persistence:
    size: 8Gi
    # storageClassName:

  myCnf: |-
    [mariadb]
    bind-address=0.0.0.0
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2
    max_allowed_packet=256M
    character-set-server=UTF8
    collation-server=utf8_general_ci

  service:
    # uncomment name to use external service
    #name:
    #endpoints:
    #  - 10.0.0.1
    #  - 10.0.0.2
    port: 3306

  ack:
    # AWS region where the RDS instance will be created
    region: us-west-2
    # RDS instance class
    dbInstanceClass: db.t3.medium
    # MariaDB engine version
    engineVersion: "10.6"
    # Allocated storage in GiB
    allocatedStorage: 20
    storageType: gp3
    storageEncrypted: true
    # Enable Multi-AZ deployment
    multiAZ: false
    # VPC ID for the SecurityGroup (required when provider is "ack")
    vpcId: ""
    # Subnet IDs for the DBSubnetGroup (required when provider is "ack"; at least two)
    subnetIDs: []
    # CIDR blocks allowed to reach RDS on port 3306
    ingressCIDRs:
      - 10.0.0.0/8

shibd:
  enabled: false
  image:
    repository: lthub/shibd
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: latest
  imagePullSecrets: []
  replicas: 1
  idp:
    discovery_url: https://example.com
    metadata_url: https://example.com/idp/shibboleth
    entity_id: https://example.com
    attribute_map_url: https://example.com/attribute-map.xml
#   attributeMap: |
#     <Attributes xmlns="urn:mace:shibboleth:2.0:attribute-map" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
#     </Attributes>
  sp:
    entity_id: https://sp.example.com
    # key:
    # cert:
  odbc:
    driver:        MySQL
    lib:           odbc-store.so
    port:          3306
    database:      *dbName
    user:          *dbUser
    password:      *dbPass
  service:
    port:             1600
  listener_acl:       0.0.0.0/0
  listener_address:   0.0.0.0
  log_level: INFO
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
  # TODO: Add vars to deployment

# webworkFiles:
#   localOverride: |
#   authen_saml2: |

# caliper TODO: Add to deployment
