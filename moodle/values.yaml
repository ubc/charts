## Global Docker image parameters
## Please, note that this will override the image parameters, including dependencies, configured to use the global value
## Current available global Docker image parameters: imageRegistry and imagePullSecrets
##
# global:
#   imageRegistry: myRegistryName
#   imagePullSecrets:
#     - myRegistryKeySecretName

fullnameOverride:
nameOverride:
commonAnnotations: {}

replicas: 1
#debug: true
## Moodle image version
## ref: https://hub.docker.com/r/lthub/moodle/tags/
##
image:
  repository: lthub/moodle
  # tag:
  ## Specify a imagePullPolicy
  ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
  ## ref: http://kubernetes.io/docs/user-guide/images/#pre-pulling-images
  ##
  pullPolicy: IfNotPresent
  ## Optionally specify an array of imagePullSecrets.
  ## Secrets must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ##
  # pullSecrets:
  #   - myRegistryKeySecretName

## Specify a imagePullPolicy
## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
## ref: http://kubernetes.io/docs/user-guide/images/#pre-pulling-images
##
# imagePullPolicy:

## User of the application
## ref: https://github.com/bitnami/bitnami-docker-moodle#configuration
##
moodleUsername: user

## Application password
## Defaults to a random 10-character alphanumeric string if not set
##
moodlePassword:
# or use existing secret for moodle password
moodleExistingSecret:

## Admin email
## ref: https://github.com/bitnami/bitnami-docker-moodle#configuration
moodleEmail: user@example.com

## No Reply Address
# moodleNoReplyAddress: noreply@example.com

## Set to `yes` to allow the container to be started with blank passwords
## ref: https://github.com/bitnami/bitnami-docker-moodle#environment-variables
allowEmptyPassword: "yes"

moodleFullName: "Moodle"

moodleShortName: "Moodle"

## SMTP mail delivery configuration
## ref: https://github.com/bitnami/bitnami-docker-moodle/#smtp-configuration
smtp:
  host:
  port:
  user:
  password:
  existingPassword:
  protocol:
  auth:

uploadMaxFileSize: &uploadMaxFileSize 20m

phpMemoryLimit: 128M

# HorizontalPodAutoscaler
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
##
## MariaDB chart configuration
##
## https://github.com/helm/charts/blob/master/stable/mariadb/values.yaml
##
db:
  enabled: true
  ## Engine selector. mariadb (default) | postgres.
  ## When postgres, the chart renders a postgresql.acid.zalan.do CR consumed
  ## by a pre-installed zalando postgres-operator (the operator itself is NOT
  ## installed by this chart).
  type: mariadb
  ## Gates the bundled mariadb subchart via Chart.yaml condition.
  ## Must be:
  ##   true  when db.enabled=true AND db.type=mariadb (the default common case)
  ##   false when db.type=postgres
  ##   false when db.enabled=false + externalDatabase.enabled=true
  ##         (external-mariadb users must set this explicitly when upgrading)
  ## The validation guard rejects mismatches at template time.
  mariadb:
    enabled: true
  ## standalone or replication
  architecture: standalone
  # DEPRECATED: use db.type instead. This field is retained for one minor
  # version for backward compatibility but is no longer consulted for engine
  # selection — db.type drives MOODLE_DB_TYPE via the moodle.dbDialect helper.
  db:
    type: mariadb
  auth:
    #rootPassword:
    database: &dbName moodle
    username: &dbUser moodle
  ## Postgres (zalando postgres-operator). Only consulted when db.type=postgres.
  postgres:
    ## Required by the operator. clusterName must start with teamId.
    teamId: ctlt
    ## Defaults to "<teamId>-<release>-moodle" when empty.
    clusterName: ""
    numberOfInstances: 2
    version: "16"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi
    tolerations: []
    nodeAffinity: {}
    volume:
      size: 10Gi
      storageClass: ""
    ## Database + role created by the operator. Moodle authenticates as `username`.
    database: moodle
    username: moodle
    ## libpq sslmode for the moodle pod's connection. Default `require` because
    ## spilo's default pg_hba rejects non-SSL connections from non-localhost.
    ## Setting `require` also makes libpq skip the client-cert lookup in
    ## ~/.postgresql/, which avoids EACCES errors in the cron container where
    ## sudo -E preserves HOME=/root. Override only if your operator config or
    ## TLS setup demands something else (e.g. verify-ca, verify-full).
    sslmode: require
    ## Continuous WAL archiving via the operator. Off by default.
    ## AWS credentials must reach the postgres pods via cluster-level setup
    ## (IRSA, pod-identity, or operator env) — the chart does not wire them.
    backup:
      enabled: false
      s3Bucket: ""
      s3Region: ""
      s3Endpoint: ""
      ## Number of full backup snapshots to keep (passed as BACKUP_NUM_TO_RETAIN
      ## to spilo/WAL-G). Despite the legacy name, this is a count, not a duration.
      ## With one full backup per day, 7 ≈ one week of retention.
      retentionCount: 7
    ## Deep-merged into the rendered CR's spec: for fields not surfaced above.
    extraManifest: {}

externalDatabase:
  enabled: false
  ## Engine-derived default: 3306 (db.type=mariadb) or 5432 (db.type=postgres).
  ## Set explicitly to override.
  port:
  database: moodle
  user: moodle
  password:
  existingSecret:

  service:
    enabled: true
    externalName: ""
    ## Reserved for future use; the rendered Service port follows externalDatabase.port
    ## (or the engine default) via the moodle.databasePort helper.
    port:

  ## Define affinity for the pod
  ## Sometimes required when persistent volumes are defined externally
  ## ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#nodeselector
#  affinity:
