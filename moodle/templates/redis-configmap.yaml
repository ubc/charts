{{- if .Values.redis.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "moodle.fullname" . }}-redis
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
    tier: cache
data:
  redis.conf: |
    # Generated by the moodle chart. Mounted at /etc/redis/redis.conf and
    # passed to redis-server on startup. Tunables come from values.yaml.
    bind 0.0.0.0
    port 6379
    protected-mode no
    dir /data

    {{- if .Values.redis.maxmemory }}
    maxmemory {{ .Values.redis.maxmemory }}
    maxmemory-policy {{ .Values.redis.maxmemoryPolicy | default "allkeys-lru" }}
    {{- end }}

    {{- if .Values.redis.persistence.enabled }}
    {{- if .Values.redis.appendOnly }}
    appendonly yes
    appendfsync {{ .Values.redis.appendFsync | default "everysec" }}
    {{- end }}
    {{- range .Values.redis.savePolicy }}
    save {{ . }}
    {{- end }}
    {{- else }}
    # Persistence disabled: no AOF, no RDB. Cache is rebuilt on pod restart.
    appendonly no
    save ""
    {{- end }}
{{- end -}}
