apiVersion: v1
kind: Service
metadata:
  name: {{ include "moodle.fullname" . }}
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.externalPort }}
    targetPort: {{ .Values.service.internalPort }}
    protocol: TCP
    name: {{ .Values.service.name }}
  selector:
    {{- include "moodle.selectorLabels" . | nindent 4 }}
    tier: app

{{- if .Values.memcached.enabled }}
---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "moodle.fullname" . }}-memcached
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 11211
    targetPort: 11211
    protocol: TCP
    name: memcached
  - port: 9150
    targetPort: 9150
    protocol: TCP
    name: metrics
  selector:
    {{- include "moodle.selectorLabels" . | nindent 4 }}
    tier: cache
{{- end -}}

{{- if .Values.redis.enabled }}
---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "moodle.fullname" . }}-redis
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  - port: 9121
    targetPort: 9121
    protocol: TCP
    name: metrics
  selector:
    {{- include "moodle.selectorLabels" . | nindent 4 }}
    tier: cache
{{- end -}}

{{- if .Values.mailpit.enabled }}
---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "moodle.fullname" . }}-mailpit
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 1025
    targetPort: 1025
    protocol: TCP
    name: smtp
  - port: 8025
    targetPort: 8025
    protocol: TCP
    name: http
  selector:
    {{- include "moodle.selectorLabels" . | nindent 4 }}
    tier: mail
{{- end -}}

{{- if .Values.externalDatabase.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "moodle.externalDatabaseName" . }}
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
spec:
  type: ExternalName
  externalName: {{ .Values.externalDatabase.service.externalName }}
  internalTrafficPolicy: Cluster
  ports:
  - port: {{ include "moodle.databasePort" . }}
    targetPort: {{ include "moodle.databasePort" . }}
    protocol: TCP
    name: db
{{- end -}}

{{- if .Values.shib.enabled }}
---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "moodle.fullname" . }}-shibd
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.shib.port }}
    targetPort: 1600
    protocol: TCP
    name: shibd
  selector:
    {{- include "moodle.selectorLabels" . | nindent 4 }}
    tier: auth
{{- end -}}
