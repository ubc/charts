{{- if and .Values.redis.enabled .Values.redis.persistence.enabled -}}
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ include "moodle.fullname" . }}-redis
  {{- with .Values.redis.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
    tier: cache
spec:
  {{- if .Values.redis.persistence.storageClass }}
  storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
  {{- end }}
  accessModes:
    - {{ .Values.redis.persistence.accessMode | default "ReadWriteOnce" | quote }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size | default "8Gi" | quote }}
{{- end -}}
