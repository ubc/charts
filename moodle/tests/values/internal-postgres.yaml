# Internal postgres via zalando postgres-operator.
db:
  enabled: true
  type: postgres
  mariadb:
    enabled: false
  postgres:
    teamId: ctlt
    numberOfInstances: 2
    version: "16"
    volume:
      size: 5Gi
    database: moodle
    username: moodle
    extraManifest:
      maintenanceWindows:
        - "Sun:00:00-Sun:03:00"
ingress:
  enabled: false
