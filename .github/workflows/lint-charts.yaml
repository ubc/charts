name: Lint Charts

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch history
        run: git fetch --prune --unshallow

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (lint)
        run: ct lint --config .github/ct-lint.yaml --target-branch ${{ github.event.repository.default_branch }}

      - name: Install yq
        run: |
          YQ_VERSION=v4.44.6
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Build moodle chart deps
        run: |
          helm repo add ubc https://ubc.github.io/charts
          helm dependency build moodle

      - name: Run moodle render assertions
        run: bash moodle/tests/run.sh
