## Bitnami MediaWiki image version
## ref: https://hub.docker.com/r/ubcctlt/mediawiki/tags/
##
image:
  repository: ubcctlt/mediawiki
  # tag:
  pullPolicy: IfNotPresent

stage: dev
replicas: 1
## Specify a imagePullPolicy
## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
## ref: http://kubernetes.io/docs/user-guide/images/#pre-pulling-images
##
# imagePullPolicy:

debug: false

## User of the application
##
adminUser: user

## Application password
## Defaults to a random 10-character alphanumeric string if not set
##
# adminPassword:

## Admin email
##
mediawikiEmail: user@example.com

# mediawikiEmergencyContact: admin@example.com
# mediawikiPasswordSender: admin@example.com

## Name for the wiki
##
mediawikiName: My Wiki

mediawikiLang: en

# Top right corner logo
#mediawikiLogo:
#  # used by new themes (e.g. 2022's Vector theme), should be a square, ideally
#  # 50x50 pixels for SVGs, 100x100 pixels for regular images. Required.
#  icon: '/path/to/img.svg'
#  # for old themes(e.g. pre-2022's Vector legacy theme). Required if still
#  # using old themes, but might be deprecated in the future.
#  legacy1x: '/path/to/img2.svg'
#  legacy2x: '/images/d/d5/Ubcwiki_logo_2x.png'

# Comma separated extension list
mediawikiExts: ""

mainCache: "CACHE_NONE"

# cacheDirectory: false

# files, db or array
# l10nCacheStore: detect

#l10nCacheManualRecache: false

apiPath: /w/api.php
restPath: /w/rest.php

# mediawikiUploadPath: //example.com/images
mediawikiUploadPath: //example.com/images

# mediawikiAllowSiteCSSOnRestrictedPages: false

# allow anonymous user to edit pages
# mediawikiAllowAnonymousEdit: true

# Enable bot password
mediawikiEnableBotPasswords: true

# Put the wiki into read-only mode. When set to a non-empty string, MediaWiki's
# $wgReadOnly is set to that value and shown to users as the reason. Leave unset
# (or empty) to allow normal editing.
# mediawikiReadOnly: "Wiki is in read-only mode for maintenance."

mediawikiUserRedirect:
  created: Main_Page
  blocked: Main_Page

# mediawiki's $wgSecretKey, recommended to be a 64 character random string
mediawikiSecretKey: 'REPLACE_ME'

googleAnalytics:
  # Google Analytics Tracking Token
  id: G-XXXXXXXX-XX
  # Google Service Account to be used for Analytics Metrics
  # metricsAllowed: '*'
  # metricsPath: /path/to/json/file
  # metricsViewID: XXXXX

googleMap:
  # Google Map API key
  apiKey: XXXXX

caliper:
  enabled: false
  host: https://caliper.imsglobal.org/caliper/PUT_TEST_BEARER_TOKEN_HERE/message
  api_key: PUT_TEST_BEARER_TOKEN_HERE
  app_base_url: http://localhost.test.com/
  ldap_actor_homepage: http://media_wiki_ldap_homepage

## SMTP mail delivery configuration
##
# smtpHost:
# smtpPort:
# smtpHostID:
# smtpUser:
# smtpPassword:

# HorizontalPodAutoscaler
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
##
## MariaDB chart configuration
## Subchart values are forwarded to the UBC `mariadb` chart at https://ubc.github.io/charts.
## Only the most common knobs are listed here; any field accepted by that chart can be set under `db:`.
## ref: https://github.com/ubc/charts/tree/master/mariadb
##
db:
  ## Whether to provision a MariaDB instance via the UBC `mariadb` subchart.
  ## Set to false to point the wiki at an externally managed database; in that
  ## case configure `externalDatabase.*` below.
  ##
  enabled: true

  ## standalone or replication
  architecture: standalone

  ## MariaDB authentication. `auth.username` + `auth.database` cause the
  ## subchart to create the database, user, and grant via the mariadb-operator.
  ## If `auth.password` is omitted, the subchart generates a random one and
  ## stores it in the `<release>-db-user-password` secret.
  ##
  auth:
    database: mediawiki
    username: wiki
    # password:

  persistence:
    size: 10Gi
    # storageClassName:

## External database settings — only used when `db.enabled` is false.
## The chart will read the password from `existingSecret`/`existingSecretPasswordKey`
## if both are set; otherwise it stores `externalDatabase.password` in a chart-owned
## secret under the `db_password` key.
##
externalDatabase:
  host: ""
  port: 3306
  user: wiki
  database: mediawiki
  schema: ""
  password: ""
  existingSecret: ""
  existingSecretPasswordKey: ""

node_services:
  enabled: true
  image:
    repository: ubcctlt/mediawiki-node-services
    # tag:
  # imagePullPolicy:
  replicas: 1
  persistence:
    enabled: false
  resources:
    requests:
      memory: 256Mi
      cpu: 100m

ldap:
  enabled: false
  domain: CWL
  server: ldap
  port: 389
  baseDn: dc=example,dc=com
  userBaseDn: dc=example,dc=com
  #searchStrings: cn=USER-NAME,dc=example,dc=com
  #searchAttrs: cn
  #proxyAgent: admin
  #proxyPassword: admin
  encryption: clear
  usernameAttr: cn
  realnameAttr: displayname
  emailAttr: mail
  ubcAuthEnabled: false

parsoid:
  skipDomainCheck: true

memcached:
  # enable internal memcached deployment and services, set to false to
  # use external memcached cluster
  enabled: false
  # Amount of memory allocated, for internal memcached deployment only
  memory: 64
  image:
    repository: memcached
    tag: 1.5-alpine
  # imagePullPolicy:
  replicas: 1
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
  serviceMonitor:
    enabled: false
  # memcached exporter for Prometheus
  exporter:
    enabled: false
    image:
      repository: quay.io/prometheus/memcached-exporter
      tag: latest
    # imagePullPolicy:
    resources:
      requests:
        memory: 16Mi
        cpu: 20m

redis:
  enabled: false
  #host:
  port: 6379
  #password:
  persistent: true

service:
  name: mediawiki
  type: ClusterIP
  externalPort: 80
  internalPort: 80

simplesamlphp:
  enabled: false
  image:
    repository: ubcctlt/mediawiki-simplesamlphp
  dev: false
  secretSalt: 'secretsalt'
  adminPassword: 'admin'
  cronSecret: 'cronsecret'
  idp:
    entityId: ''
    metadataUrl: ''
  resources:
    requests:
      memory: 256Mi
  persistence:
    storageClass: ""
    accessMode: ReadWriteMany
    size: 2Gi
    resources:
      nfs:
        server: some-nfs-server
        path: "/wikistg-simplesamlphp"
    sp:
      entityId: ''
      certs:
        crt: |
          -----BEGIN CERTIFICATE-----
          <place your own cert here>
          -----END CERTIFICATE-----
        pem: |
          -----BEGIN PRIVATE KEY-----
          <place your own key here>
          -----END PRIVATE KEY-----


## Enable persistence using Persistent Volume Claims
## ref: http://kubernetes.io/docs/user-guide/persistent-volumes/
##
persistence:
  enabled: false
  ## If defined, volume.beta.kubernetes.io/storage-class: <storageClass>
  ## Default: volume.alpha.kubernetes.io/storage-class: default
  ##
  storageClass: ""
  accessMode: ReadWriteMany
  size: 8Gi

ingress:
  enabled: true
  # Used to create Ingress record (should used with service.type: ClusterIP).
  hosts:
    # if there are multiple host names, first one will be the primary.
    -
    #- wiki.example.local
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 20m

## Configure resource requests and limits
## ref: http://kubernetes.io/docs/user-guide/compute-resources/
##
resources:
  requests:
    memory: 512Mi
    cpu: 300m

# LDAP settings
#ldap:
#  enabled: true
#  domain: YOUR_DOMAIN
#  server: ldap.example.com
#  port: 636
#  baseDn: "ou=users,ou=ORG,dc=example,dc=com"
#  searchAttrs: uid
#  proxyAgent: "uid=wiki,ou=Service Accounts,ou=SERVICES,dc=example,dc=com"
#  proxyPassword: "PASSWORD"
#  debug: 3
#  encryption: ssl

jobrunner:
  enabled: false
  resources:
    requests:
      cpu: "50m"
      memory: "150Mi"

mediawikiFiles:
  CustomSettings.php: |-
    <?php ?>

