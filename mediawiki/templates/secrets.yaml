{{/*
Read the existing Secret (if any) so generated passwords stay stable across
helm upgrades. Without this, every `helm template` / `helm upgrade` re-runs
randAlphaNum and rotates the value, breaking active sessions / external
references that consume it.
*/}}
{{- $secretName := include "mediawiki.fullname" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) | default dict -}}
{{- $existingData := (get $existing "data") | default dict -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "common_labels" . | indent 4 }}
type: Opaque
data:
  {{- if and (not .Values.db.enabled) (not .Values.externalDatabase.existingSecret) }}
  {{- if .Values.externalDatabase.password }}
  db_password: {{ .Values.externalDatabase.password | b64enc | quote }}
  {{- else if hasKey $existingData "db_password" }}
  db_password: {{ index $existingData "db_password" | quote }}
  {{- else }}
  db_password: {{ randAlphaNum 10 | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.adminPassword }}
  mediawiki_password: {{ .Values.adminPassword | b64enc | quote }}
  {{- else if hasKey $existingData "mediawiki_password" }}
  mediawiki_password: {{ index $existingData "mediawiki_password" | quote }}
  {{- else }}
  mediawiki_password: {{ randAlphaNum 10 | b64enc | quote }}
  {{- end }}
  smtp_password: {{ default "" .Values.smtpPassword | b64enc | quote }}
  {{- if .Values.ldap.enabled }}
  ldap_proxy_password: {{ default "" .Values.ldap.proxyPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.caliper.api_key }}
  caliper_api_key: {{ .Values.caliper.api_key | b64enc | quote }}
  {{- end }}
