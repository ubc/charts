{{- if .Values.cleanup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "canvas-bridge.fullname" . }}-cleanup
  labels:
    {{- include "canvas-bridge.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.cleanup.schedule | quote }}
  concurrencyPolicy: {{ .Values.cleanup.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cleanup.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cleanup.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "canvas-bridge.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: cleanup
        spec:
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: cleanup
              image: "{{ .Values.cleanup.image.repository }}:{{ .Values.cleanup.image.tag }}"
              command:
                - sh
                - -c
                - |
                  curl -sf -X POST "${CANVAS_BRIDGE_URL}/internal/cleanup" \
                    -H "X-Internal-Token: ${CLEANUP_SECRET}"
              env:
                - name: CANVAS_BRIDGE_URL
                  value: {{ .Values.cleanup.internalUrl | quote }}
                - name: CLEANUP_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "canvas-bridge.fullname" . }}
                      key: cleanup-secret
              {{- with .Values.cleanup.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
